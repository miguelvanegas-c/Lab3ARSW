version: "3.8"

services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/$blueprintDB
      - SPRING_DATASOURCE_USERNAME=admin
      - SPRING_DATASOURCE_PASSWORD=admin
      - SPRING_PROFILES_ACTIVE=local
    depends_on:
      - postgres-db
  postgres-db:
    image: postgres:15
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=$blueprintDB
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin
      - SPRING_PROFILES_ACTIVE=local
      - SECURITY_PASSWORD=$admin
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data: